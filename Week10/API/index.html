<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Finder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #666;
            font-size: 0.9em;
        }

        .search-box {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 15px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
            padding: 20px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .results {
            display: grid;
            gap: 15px;
        }

        .university-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .university-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .university-name {
            color: #333;
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .university-info {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .university-link {
            display: inline-block;
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
            padding: 8px 15px;
            border: 2px solid #667eea;
            border-radius: 5px;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .university-link:hover {
            background: #667eea;
            color: white;
        }

        .error {
            background: #ff4757;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }

        .error.show {
            display: block;
            margin-bottom: 20px;
        }

        .count {
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
            color: #667eea;
            display: none;
        }

        .count.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header Section -->
        <div class="header">
            <h1>🎓 University Finder</h1>
            <p class="subtitle">Search universities by country name</p>
        </div>

        <!-- Search Box -->
        <div class="search-box">
            <div class="input-group">
                <input 
                    type="text" 
                    id="countryInput" 
                    placeholder="Enter country name (e.g., India, Canada, Japan)"
                    autocomplete="off"
                >
                <button onclick="searchUniversities()">Search</button>
            </div>
        </div>

        <!-- Loading Message -->
        <div class="loading" id="loading">
            🔍 Searching for universities...
        </div>

        <!-- Error Message -->
        <div class="error" id="error">
            ⚠️ Something went wrong. Please try again!
        </div>

        <!-- Results Count -->
        <div class="count" id="count"></div>

        <!-- Results Container -->
        <div class="results" id="results"></div>
    </div>

    <script>
        // Allow Enter key to trigger search
        document.getElementById('countryInput').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                searchUniversities();
            }
        });

        // Main function to search universities
        function searchUniversities() {
            // Step 1: Get the country name from input
            const countryInput = document.getElementById('countryInput');
            const countryName = countryInput.value.trim();

            // Validate input
            if (countryName === '') {
                alert('Please enter a country name!');
                return;
            }

            // Get elements we'll need
            const resultsContainer = document.getElementById('results');
            const loadingElement = document.getElementById('loading');
            const errorElement = document.getElementById('error');
            const countElement = document.getElementById('count');

            // Clear previous results
            resultsContainer.innerHTML = '';
            errorElement.classList.remove('show');
            countElement.classList.remove('show');

            // Show loading message
            loadingElement.classList.add('show');

            // Step 2: Build the API URL
            const apiUrl = `http://universities.hipolabs.com/search?country=${countryName}`;

            // Step 3: Fetch data from the API
            fetch(apiUrl)
                // Step 4: Convert response to JSON
                .then(response => response.json())
                
                // Step 5: Process the data
                .then(data => {
                    // Hide loading
                    loadingElement.classList.remove('show');

                    // Check if we got any results
                    if (data.length === 0) {
                        resultsContainer.innerHTML = `
                            <div class="university-card">
                                <div class="university-name">No universities found</div>
                                <div class="university-info">Try a different country name</div>
                            </div>
                        `;
                        return;
                    }

                    // Show count
                    countElement.textContent = `Found ${data.length} universities`;
                    countElement.classList.add('show');

                    // Step 6: Loop through each university and create a card
                    data.forEach(university => {
                        // Create a card div
                        const card = document.createElement('div');
                        card.className = 'university-card';

                        // Build the HTML content
                        let cardHTML = `
                            <div class="university-name">${university.name}</div>
                        `;

                        // Add state/province if available
                        if (university['state-province']) {
                            cardHTML += `
                                <div class="university-info">
                                    📍 ${university['state-province']}
                                </div>
                            `;
                        }

                        // Add country
                        cardHTML += `
                            <div class="university-info">
                                🌍 ${university.country}
                            </div>
                        `;

                        // Add website link
                        if (university.web_pages && university.web_pages.length > 0) {
                            cardHTML += `
                                <a href="${university.web_pages[0]}" 
                                   target="_blank" 
                                   class="university-link">
                                   🔗 Visit Website
                                </a>
                            `;
                        }

                        // Set the HTML content
                        card.innerHTML = cardHTML;

                        // Add the card to results container
                        resultsContainer.appendChild(card);
                    });
                })

                // Step 7: Handle errors
                .catch(error => {
                    loadingElement.classList.remove('show');
                    errorElement.classList.add('show');
                    console.error('Error:', error);
                });
        }
    </script>
</body>
</html>
