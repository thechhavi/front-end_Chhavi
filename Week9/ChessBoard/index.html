<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chessboard Generator</title>
</head>
<body>
    <div id="chessboard"></div>

    <script>
        // Step 1: Get the container element
        const chessboard = document.getElementById('chessboard');

        // Step 2: Style the container using JavaScript
        chessboard.style.display = 'grid';
        chessboard.style.gridTemplateColumns = 'repeat(8, 60px)';
        chessboard.style.gridTemplateRows = 'repeat(8, 60px)';
        chessboard.style.width = '480px';
        chessboard.style.height = '480px';
        chessboard.style.border = '4px solid #333';
        chessboard.style.margin = '50px auto';
        chessboard.style.boxShadow = '0 10px 30px rgba(0,0,0,0.3)';

        // Step 3: Generate 64 squares using nested loops
        for (let row = 0; row < 8; row++) {           // Outer loop: 8 rows
            for (let col = 0; col < 8; col++) {       // Inner loop: 8 columns
                
                // Create a new div element for each square
                const square = document.createElement('div');
                
                // Calculate if this should be light or dark
                // If row + col is even → light square
                // If row + col is odd → dark square
                if ((row + col) % 2 === 0) {
                    square.style.backgroundColor = '#f0d9b5';  // Light brown
                } else {
                    square.style.backgroundColor = '#b58863';  // Dark brown
                }
                
                // Optional: Add coordinates for learning
                square.style.display = 'flex';
                square.style.alignItems = 'center';
                square.style.justifyContent = 'center';
                square.style.fontSize = '10px';
                square.style.color = 'rgba(0,0,0,0.2)';
                square.style.fontFamily = 'monospace';
                square.textContent = `${row},${col}`;
                
                // Add hover effect
                square.style.transition = 'transform 0.2s';
                square.addEventListener('mouseenter', function() {
                    this.style.transform = 'scale(0.95)';
                    this.style.cursor = 'pointer';
                });
                square.addEventListener('mouseleave', function() {
                    this.style.transform = 'scale(1)';
                });
                
                // Add the square to the chessboard
                chessboard.appendChild(square);
            }
        }

        // Step 4: Add a title above the board
        const title = document.createElement('h1');
        title.textContent = '♟️ JavaScript Chessboard ♟️';
        title.style.textAlign = 'center';
        title.style.fontFamily = 'Arial, sans-serif';
        title.style.color = '#333';
        title.style.marginTop = '20px';
        document.body.insertBefore(title, chessboard);

        // Step 5: Style the body
        document.body.style.backgroundColor = '#f5f5f5';
        document.body.style.margin = '0';
        document.body.style.padding = '0';
    </script>
</body>
</html>
